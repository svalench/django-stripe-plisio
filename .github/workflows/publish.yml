name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -e ".[dev]" build

      - name: Verify release tag matches package version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          INIT_VERSION=$(python -c "import importlib.util; spec=importlib.util.spec_from_file_location('dsp', 'src/django_stripe_plisio/__init__.py'); m=importlib.util.module_from_spec(spec); spec.loader.exec_module(m); print(m.__version__)")
          if [ "$VERSION" != "$PYPROJECT_VERSION" ] || [ "$VERSION" != "$INIT_VERSION" ]; then
            echo "::error::Release tag '$TAG' → version '$VERSION' does not match package version."
            echo "  pyproject.toml: $PYPROJECT_VERSION"
            echo "  __init__.py:    $INIT_VERSION"
            echo ""
            echo "Fix: create GitHub Release with tag v${PYPROJECT_VERSION} (or update both version files before release)."
            exit 1
          fi

      - name: Run tests
        run: pytest tests/ -v

      - name: Ruff
        run: ruff check src tests

      - name: Mypy
        run: mypy src/django_stripe_plisio

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
